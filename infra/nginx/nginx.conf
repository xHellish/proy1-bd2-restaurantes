events {
  worker_connections 1024;
}

http {
  # Connection pooling and keepalive for upstream servers
  keepalive_timeout 65;

  # API upstream — Docker DNS automatically resolves to all api service instances
  upstream api_upstream {
    least_conn;  # Load balancing method: least connections
    server api:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  # Search upstream — Docker DNS automatically resolves to all search service instances
  upstream search_upstream {
    least_conn;  # Load balancing method: least connections
    server search:4000 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 10M;

    # Root health check for LB/monitoring
    location /health {
      default_type application/json;
      return 200 '{"status":"ok","gateway":"nginx"}';
    }

    # API routes and Swagger UI
    location /api/ {
      proxy_pass http://api_upstream/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_http_version 1.1;

      # Timeouts for long-running requests
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }

    # API JSON spec endpoint
    location /api-json {
      proxy_pass http://api_upstream/api-json;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Connection "";
      proxy_http_version 1.1;
    }

    # Search routes
    location /search/ {
      proxy_pass http://search_upstream/search/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_http_version 1.1;

      # Timeouts for search operations
      proxy_connect_timeout 30s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }

    # Default location
    location / {
      default_type text/plain;
      return 404 'Not found. Use /api/ or /search/';
    }
  }
}

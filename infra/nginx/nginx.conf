events {}

http {
  upstream api_upstream {
    server api:3000;
  }

  upstream search_upstream {
    server search:4000;
  }

  server {
    listen 80;

    # Swagger UI y API — proxy directo sin strip de prefijo
    location /api/ {
      proxy_pass http://api_upstream/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API JSON spec
    location /api-json {
      proxy_pass http://api_upstream/api-json;
      proxy_set_header Host $host;
    }

    location /search/ {
      proxy_pass http://search_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
      default_type application/json;
      return 200 '{"status":"ok","gateway":"nginx"}';
    }
  }
}

services:
  # ===== DATABASES =====
  postgres:
    image: postgres:16-alpine
    container_name: postgres-test
    mem_limit: 512m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-test_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-test_password}
      POSTGRES_DB: ${POSTGRES_DB:-test_db}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-test_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:8
    container_name: mongodb-test
    mem_limit: 256m
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-test_db}
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis-test
    mem_limit: 128m
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.5
    container_name: elasticsearch-test
    mem_limit: 512m
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== MICROSERVICES =====
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: api-test
    mem_limit: 512m
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://${POSTGRES_USER:-test_user}:${POSTGRES_PASSWORD:-test_password}@postgres:5432/${POSTGRES_DB:-test_db}
      MONGO_URI: mongodb://mongodb:27017/${MONGODB_DATABASE:-test_db}
      REDIS_URL: redis://redis:6379
      ELASTIC_URL: http://elasticsearch:9200
      API_PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    command: npm test
    working_dir: /app/services/api

  search:
    build:
      context: .
      dockerfile: services/search/Dockerfile
    container_name: search-test
    mem_limit: 256m
    environment:
      NODE_ENV: test
      MONGO_URI: mongodb://mongodb:27017/${MONGODB_DATABASE:-test_db}
      ELASTIC_URL: http://elasticsearch:9200
      REDIS_URL: redis://redis:6379
      SEARCH_PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      mongodb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm test
    working_dir: /app/services/search


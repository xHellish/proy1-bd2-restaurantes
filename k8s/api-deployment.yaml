apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: restaurantes
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: restaurantes-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: database-url
              optional: true
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: mongo-uri
              optional: true
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: ELASTIC_URL
          value: "http://elasticsearch-service:9200"
        - name: SEARCH_SERVICE_URL
          value: "http://search-service:4000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"

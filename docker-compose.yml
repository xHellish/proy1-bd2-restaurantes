services:
  # ===== PostgreSQL =====
  postgres:
    image: postgres:16
    container_name: py01_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===== MongoDB Replica Set (3 nodos) =====
  mongo1:
    image: mongo:8
    container_name: py01_mongo1
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo1_data:/data/db

  mongo2:
    image: mongo:8
    container_name: py01_mongo2
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo2_data:/data/db

  mongo3:
    image: mongo:8
    container_name: py01_mongo3
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo3_data:/data/db

  # Inicialización del Replica Set (corre una vez y se detiene — es normal)
  mongo-setup:
    image: mongo:8
    container_name: py01_mongo_setup
    restart: "no"
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    volumes:
      - ./infra/mongo/init-replica.sh:/scripts/init-replica.sh:ro
    entrypoint: ["bash", "/scripts/init-replica.sh"]

  # ===== Redis =====
  redis:
    image: redis:7
    container_name: py01_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ===== Elasticsearch =====
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.5
    container_name: py01_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 120s

  # ===== API Service =====
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo-setup:
        condition: service_completed_successfully
    ports:
      - "3000"
    environment:
      - NODE_ENV=production

  # ===== Search Service =====
  search:
    build:
      context: .
      dockerfile: services/search/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000"
    environment:
      - NODE_ENV=production

  # ===== Nginx Gateway =====
  nginx:
    image: nginx:1.27
    container_name: py01_nginx
    restart: unless-stopped
    depends_on:
      - api
      - search
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  mongo1_data:
  mongo2_data:
  mongo3_data:
  es_data:

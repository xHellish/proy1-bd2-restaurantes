services:
  postgres:
    image: postgres:16
    container_name: py01_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo1:
    image: mongo:8
    container_name: py01_mongo1
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db

  mongo2:
    image: mongo:8
    container_name: py01_mongo2
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27018"]
    ports:
      - "27018:27018"
    volumes:
      - mongo2_data:/data/db

  mongo3:
    image: mongo:8
    container_name: py01_mongo3
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27019"]
    ports:
      - "27019:27019"
    volumes:
      - mongo3_data:/data/db

  mongo-setup:
    image: mongo:8
    container_name: py01_mongo_setup
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    volumes:
      - ./infra/mongo/init-replica.sh:/scripts/init-replica.sh:ro
    entrypoint: ["bash", "/scripts/init-replica.sh"]

  redis:
    image: redis:7
    container_name: py01_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.5
    container_name: py01_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      mongo-setup:
        condition: service_completed_successfully
    ports:
      - "3000"  # Docker will assign dynamic ports for scaling
    environment:
      - NODE_ENV=production
    # For horizontal scaling, use: docker-compose up -d --scale api=3
    # Nginx will automatically load-balance across all instances via Docker DNS

  search:
    build:
      context: .
      dockerfile: services/search/Dockerfile
    env_file:
      - .env
    depends_on:
      - elasticsearch
      - redis
    ports:
      - "4000"  # Docker will assign dynamic ports for scaling
    environment:
      - NODE_ENV=production
    # For horizontal scaling, use: docker-compose up -d --scale search=3
    # Nginx will automatically load-balance across all instances via Docker DNS

  nginx:
    image: nginx:1.27
    container_name: py01_nginx
    depends_on:
      - api
      - search
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    # Nginx upstream blocks automatically discover and load-balance
    # across multiple scaled instances thanks to Docker's embedded DNS resolver

volumes:
  postgres_data:
  mongo1_data:
  mongo2_data:
  mongo3_data:

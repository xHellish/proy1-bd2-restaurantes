name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: "22"
  COVERAGE_THRESHOLD: 90

jobs:
  # ===== STAGE 1: TEST & QUALITY =====
  test:
    name: Test & Quality Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      mongodb:
        image: mongo:8
        options: >-
          --health-cmd "sh -c 'mongosh --eval \"db.adminCommand({ ping: 1 })\"'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.15.5
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        options: >-
          --health-cmd "curl -s http://localhost:9200 >/dev/null || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 9200:9200

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install workspace dependencies
        run: npm ci --workspaces

      - name: Run linter
        run: npm run lint
        continue-on-error: false

      - name: Setup environment variables for tests
        run: |
          cat > .env.test << EOF
          NODE_ENV=test
          DATABASE_URL=postgresql://test_user:test_password@localhost:5432/test_db
          MONGO_URI=mongodb://localhost:27017/test_db
          REDIS_URL=redis://localhost:6379
          ELASTIC_URL=http://localhost:9200
          API_PORT=3000
          SEARCH_PORT=4000
          EOF

      - name: Run API tests with coverage
        run: npm --workspace services/api test -- --coverage --coverageReporters=json-summary
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          MONGO_URI: mongodb://localhost:27017/test_db
          REDIS_URL: redis://localhost:6379
          ELASTIC_URL: http://localhost:9200

      - name: Run Search tests with coverage
        run: npm --workspace services/search test -- --coverage --coverageReporters=json-summary
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          MONGO_URI: mongodb://localhost:27017/test_db
          REDIS_URL: redis://localhost:6379
          ELASTIC_URL: http://localhost:9200

      - name: Debug coverage outputs
        run: |
          ls -la services/api/coverage || true
          ls -la services/search/coverage || true
          cat services/api/coverage/coverage-summary.json || true
          cat services/search/coverage/coverage-summary.json || true

      - name: Verify coverage threshold
        run: |
          COVERAGE=$(node - <<'NODE'
          const fs = require('fs');
          const paths = [
            'services/api/coverage/coverage-summary.json',
            'services/search/coverage/coverage-summary.json'
          ];

          let covered = 0;
          let total = 0;
          let foundAny = false;

          for (const p of paths) {
            if (!fs.existsSync(p)) continue;
            foundAny = true;
            const json = JSON.parse(fs.readFileSync(p, 'utf8'));
            covered += json.total?.lines?.covered ?? 0;
            total += json.total?.lines?.total ?? 0;
          }

          if (!foundAny) {
            console.error(`No coverage summary files found. Expected one of:\n- ${paths.join('\n- ')}`);
            process.exit(2);
          }

          if (total === 0) {
            console.error('Coverage summaries found but total lines = 0. Check Jest/coverage config.');
            process.exit(3);
          }

          const pct = (covered / total) * 100;
          process.stdout.write(pct.toFixed(2));
          NODE
          )

          echo "Code coverage: ${COVERAGE}%"
          node -e "process.exit(Number(process.argv[1]) >= Number(process.argv[2]) ? 0 : 1)" "$COVERAGE" "${{ env.COVERAGE_THRESHOLD }}"
          echo "✅ Coverage check passed: ${COVERAGE}% >= ${{ env.COVERAGE_THRESHOLD }}%"

  # ===== STAGE 2: BUILD & PUBLISH =====
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [api, search]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:buildcache,mode=max

  # ===== STAGE 3: NOTIFICATIONS =====
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [test, build-and-push]
    if: always()

    steps:
      - name: Check workflow status
        run: |
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "❌ Test stage failed"
            exit 1
          fi
          if [[ "${{ needs.build-and-push.result }}" == "failure" ]]; then
            echo "⚠️  Build stage failed (may be skipped on PR)"
          fi
          echo "✅ Pipeline completed successfully"
